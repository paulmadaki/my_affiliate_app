<!DOCTYPE html>
<html>
<head>
    <title>Trivia & Earn</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        .box { border: 1px solid #ccc; padding: 20px; border-radius: 10px; display: inline-block; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Welcome to your Tech Platform</h1>
    <div class="box">
        <h3>Trivia Game</h3>
        <p id="question">Loading question...</p>
        <div id="options"></div>
    </div>
    <hr>
    <p>Registration Fee: $2 (Pay in Naira via Paystack)</p>
    <button onclick="alert('Paystack logic coming next!')">Register to Earn $0.50/Referral</button>

    <script>
        // This script will talk to your Python backend
        fetch('/get-question')
            .then(res => res.json())
            .then(data => {
                document.getElementById('question').innerText = data.question;
                data.options.forEach(opt => {
                    let btn = document.createElement('button');
                    btn.innerText = opt;
                    btn.style.margin = "5px";
                    document.getElementById('options').appendChild(btn);
                });
            });
    </script>
</body>
</html>
